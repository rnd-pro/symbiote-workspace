name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  package-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test packed native ESM consumers
        run: npm run test:package-consumer

      - name: Inspect npm package contents
        run: npm pack --dry-run --json --ignore-scripts

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npm exec -- playwright install --with-deps chromium

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Pages
        env:
          ORIGIN: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: npm run build:pages

      - name: Test Pages artifact
        env:
          ORIGIN: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: npm run test:pages

      - name: Test Pages artifact in Chromium
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run test:pages:browser

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - package-contract
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
